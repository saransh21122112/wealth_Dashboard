services:
  - type: web
    name: aurelia-wealth-dashboard
    env: docker
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false